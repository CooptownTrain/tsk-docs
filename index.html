<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TSK Executive Document Hub</title>
<link rel="stylesheet" href="interactive.css">
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --surface-2: #f0efec;
    --surface-3: #e8e7e3;
    --border: #d8d6d0;
    --border-light: #eae8e4;
    --text: #1a1a1a;
    --text-muted: #5c5c5c;
    --text-dim: #8a8a8a;
    --accent: #2c5282;
    --accent-light: #ebf2fa;
    --gold: #8b6914;
    --gold-light: #faf6ed;
    --amber: #b7791f;
    --amber-light: #fefcf3;
    --green: #276749;
    --green-light: #f0fff4;
    --purple: #553c9a;
    --purple-light: #f3f0ff;
    --red: #c53030;
    --red-light: #fff5f5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* STICKY HEADER */
  .hub-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 2px solid var(--border);
    transition: box-shadow 0.2s;
  }
  .hub-header.scrolled {
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .hub-header-inner {
    max-width: 920px;
    margin: 0 auto;
    padding: 20px 24px 14px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .hub-header-left { flex: 1; min-width: 0; }
  .hub-header-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
  }
  .hub-header-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.6px;
    color: var(--text);
    margin-top: 2px;
    line-height: 1.2;
  }
  .hub-header-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 3px;
  }
  .hub-header-toolbar {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    margin-left: 24px;
    margin-top: 8px;
  }
  .hub-stats {
    max-width: 920px;
    margin: 0 auto;
    padding: 0 24px 12px;
    font-size: 14px;
    color: var(--text-dim);
  }

  /* CONTROLS BAR */
  .hub-controls {
    position: sticky;
    top: 0; /* will be set by JS to sit below header */
    z-index: 90;
    background: var(--bg);
    border-bottom: 1px solid var(--border-light);
  }
  .hub-controls-inner {
    max-width: 920px;
    margin: 0 auto;
    padding: 12px 24px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .hub-search-wrap {
    flex: 1;
    position: relative;
  }
  .hub-search {
    width: 100%;
    padding: 9px 14px 9px 36px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .hub-search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(44, 82, 130, 0.1);
  }
  .hub-search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 14px;
    pointer-events: none;
  }
  .hub-search-hint {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    background: var(--surface-2);
    border: 1px solid var(--border-light);
    border-radius: 4px;
    padding: 1px 6px;
    pointer-events: none;
    line-height: 1.4;
  }
  .hub-sort {
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    outline: none;
    min-width: 140px;
  }
  .hub-sort:focus {
    border-color: var(--accent);
  }

  /* FILTER CHIPS */
  .hub-filter-chips {
    max-width: 920px;
    margin: 0 auto;
    padding: 8px 24px;
    display: none;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .hub-filter-chips.active {
    display: flex;
  }
  .hub-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    background: var(--accent-light);
    color: var(--accent);
    font-size: 12px;
    font-weight: 600;
    border-radius: 12px;
    border: none;
    cursor: default;
  }
  .hub-chip-x {
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    line-height: 1;
    opacity: 0.6;
    transition: opacity 0.1s;
    margin-left: 2px;
  }
  .hub-chip-x:hover { opacity: 1; }
  .hub-clear-all {
    font-size: 12px;
    color: var(--text-dim);
    cursor: pointer;
    margin-left: auto;
    border: none;
    background: none;
    font-family: inherit;
    text-decoration: underline;
  }
  .hub-clear-all:hover { color: var(--text); }

  /* TYPE FILTER BAR */
  .hub-type-bar {
    max-width: 920px;
    margin: 0 auto;
    padding: 10px 24px 2px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .hub-type-btn {
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid var(--border);
    border-radius: 16px;
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .hub-type-btn:hover { border-color: var(--accent); color: var(--accent); }
  .hub-type-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .hub-type-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 4px;
  }

  /* LINKED DOC */
  .doc-linked {
    margin-top: 8px;
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
    opacity: 0.7;
    transition: opacity 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .doc-linked:hover { opacity: 1; }
  .doc-linked-icon { margin-right: 3px; }

  /* ARCHIVE TOGGLE */
  .hub-archive-toggle {
    grid-column: 1 / -1;
    text-align: center;
    padding: 10px;
  }
  .hub-archive-btn {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    background: none;
    border: 1px solid var(--border-light);
    border-radius: 8px;
    padding: 6px 16px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .hub-archive-btn:hover { border-color: var(--border); color: var(--text-muted); }

  /* CONTENT WRAPPER */
  .hub-content-wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: 24px 24px 80px;
  }

  /* CATEGORY ACCORDION */
  .hub-cat {
    margin-bottom: 24px;
  }
  .hub-cat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 10px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s, border-color 0.15s;
  }
  .hub-cat-header:hover {
    background: var(--surface-2);
    border-color: var(--border);
  }
  .hub-cat-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .hub-cat-title {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    flex: 1;
  }
  .hub-cat-count {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    background: var(--surface-2);
    padding: 2px 10px;
    border-radius: 10px;
  }
  .hub-cat-chevron {
    font-size: 16px;
    color: var(--text-dim);
    transition: transform 0.2s;
    flex-shrink: 0;
    line-height: 1;
  }
  .hub-cat.collapsed .hub-cat-chevron {
    transform: rotate(-90deg);
  }
  .hub-cat-body {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 12px;
    padding: 12px 0 0;
  }
  .hub-cat.collapsed .hub-cat-body {
    display: none;
  }
  .hub-cat-empty {
    padding: 20px 24px;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 10px;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
    grid-column: 1 / -1;
  }

  /* DOCUMENT CARDS (grid) */
  .doc-card {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 10px;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    cursor: pointer;
    color: inherit;
    position: relative;
    overflow: hidden;
  }
  .doc-card:hover {
    border-color: var(--accent);
    box-shadow: 0 6px 20px rgba(44, 82, 130, 0.12);
    transform: translateY(-2px);
  }
  .doc-card.has-actions {
    border-left: 3px solid var(--amber);
  }
  .doc-color-bar {
    height: 4px;
    width: 100%;
    flex-shrink: 0;
  }
  .doc-card-body {
    flex: 1;
    padding: 14px 16px 16px;
    display: flex;
    flex-direction: column;
  }
  .doc-card-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .doc-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .badge-new { background: var(--purple-light); color: var(--purple); }
  .badge-current { background: var(--accent-light); color: var(--accent); }
  .badge-superseded { background: var(--surface-2); color: var(--text-dim); }
  .badge-draft { background: var(--amber-light); color: var(--amber); }
  .doc-date {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .doc-title {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
    line-height: 1.3;
  }
  .doc-card.superseded .doc-title {
    text-decoration: line-through;
    color: var(--text-dim);
  }
  .doc-people {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    margin-top: 6px;
    line-height: 1.4;
  }
  .doc-people-icon {
    display: inline;
    margin-right: 4px;
    opacity: 0.6;
  }
  .doc-desc {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 8px;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    flex: 1;
  }
  .doc-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 10px;
  }
  .doc-tag {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 10px;
    background: var(--surface-2);
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
    border: none;
    font-family: inherit;
    line-height: 1.4;
  }
  .doc-tag:hover {
    background: var(--accent-light);
    color: var(--accent);
  }
  .doc-next-steps {
    margin-top: 12px;
    padding: 8px 12px;
    background: var(--amber-light);
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--amber);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .doc-next-steps-icon {
    font-size: 10px;
  }

  /* DRIVE BADGE */
  .doc-drive-badge {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 3px;
    background: #e6f4ea;
    color: #0d652d;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    vertical-align: middle;
    margin-left: 6px;
  }

  /* VIEW TOGGLE */
  .hub-view-toggle {
    display: flex;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .hub-view-btn {
    padding: 7px 12px;
    font-size: 13px;
    font-family: inherit;
    border: none;
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1;
  }
  .hub-view-btn:not(:last-child) { border-right: 1px solid var(--border); }
  .hub-view-btn:hover { color: var(--text-muted); }
  .hub-view-btn.active { background: var(--accent); color: #fff; }

  /* LIST VIEW */
  .hub-cat-body.list-view {
    display: flex !important;
    flex-direction: column;
    gap: 0;
  }
  .list-view .doc-card {
    flex-direction: row;
    align-items: center;
    border-radius: 0;
    border-left: none;
    border-right: none;
    border-bottom: none;
  }
  .list-view .doc-card:first-child { border-top: none; }
  .list-view .doc-card:last-child { border-bottom: 1px solid var(--border-light); }
  .list-view .doc-card.has-actions { border-left: 3px solid var(--amber); }
  .list-view .doc-color-bar { display: none; }
  .list-view .doc-card-body {
    flex-direction: row;
    align-items: center;
    gap: 16px;
    padding: 10px 16px;
  }
  .list-view .doc-card-top { margin-bottom: 0; min-width: 100px; }
  .list-view .doc-title { font-size: 14px; min-width: 200px; flex-shrink: 0; }
  .list-view .doc-people { margin-top: 0; min-width: 120px; flex-shrink: 0; }
  .list-view .doc-desc { display: none; }
  .list-view .doc-tags { display: none; }
  .list-view .doc-linked { display: none; }
  .list-view .doc-next-steps { margin-top: 0; padding: 4px 8px; white-space: nowrap; }
  .list-view .doc-card:hover { transform: none; box-shadow: none; background: var(--surface-2); }

  /* List view for flat container */
  #hub-categories.list-view {
    display: flex !important;
    flex-direction: column !important;
    gap: 0 !important;
  }

  /* FLAT VIEW CATEGORY BADGE */
  .doc-cat-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    white-space: nowrap;
    margin-left: 8px;
  }

  /* FOOTER */
  .hub-footer {
    max-width: 920px;
    margin: 0 auto;
    padding: 20px 24px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
  }

  /* PRINT */
  @media print {
    .hub-header, .hub-controls, .hub-filter-chips, .hub-cat-chevron,
    #doc-toolbar, .hub-stats, .doc-tag { display: none !important; }
    body { background: #fff !important; }
    .hub-cat-body { display: grid !important; grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; }
    .doc-card { box-shadow: none !important; border: 1px solid #ddd !important; break-inside: avoid; }
    .doc-card:hover { transform: none !important; }
    .hub-content-wrap { max-width: 100% !important; }
    .hub-cat-header { cursor: default !important; }
    @page { margin: 1.5cm; }
  }

  /* MOBILE */
  @media (max-width: 600px) {
    .hub-header-title { font-size: 22px; }
    .hub-stats { display: none; }
    .hub-header-inner { padding: 16px 16px 10px; }
    .hub-header-toolbar { gap: 4px; margin-left: 12px; }
    .hub-controls-inner {
      flex-direction: column;
      padding: 10px 16px;
      gap: 8px;
    }
    .hub-search-wrap { width: 100%; }
    .hub-sort { width: auto; min-width: 0; flex: 1; }
    .hub-view-toggle { flex-shrink: 0; }
    .hub-controls-inner { flex-wrap: wrap; }
    .list-view .doc-card-body { flex-wrap: wrap; }
    .list-view .doc-title { min-width: 0; flex: 1; }
    .hub-content-wrap { padding: 16px 16px 60px; }
    .hub-cat-body { grid-template-columns: 1fr; }
    .hub-cat-header { padding: 12px 16px; }
    .hub-filter-chips { padding: 8px 16px; }
    .hub-footer { padding: 20px 16px; }
    .hub-type-bar { padding: 8px 16px 2px; }
    .hub-header-toolbar button { padding: 5px 8px; font-size: 10px; }
  }
</style>
</head>

<!-- STICKY HEADER -->
<div class="hub-header" id="hub-header">

<!-- CONTROLS BAR -->
<div class="hub-controls" id="hub-controls">

      <button class="hub-view-btn" data-view="list" title="List view">&#9776;</button>
    </div>
  </div>
</div>

<!-- FILTER CHIPS -->
<div class="hub-filter-chips" id="hub-filter-chips"></div>

<!-- TYPE FILTER BAR -->
<div class="hub-type-bar" id="hub-type-bar">
  <span class="hub-type-label">Type:</span>
  <button class="hub-type-btn active" data-type="all">All</button>
  <button class="hub-type-btn" data-type="notes">Notes</button>
  <button class="hub-type-btn" data-type="prep">Prep</button>
  <button class="hub-type-btn" data-type="dealmaker">Analysis</button>
  <button class="hub-type-btn" data-type="shared">Drive</button>
  <button class="hub-type-btn" data-type="reference">Reference</button>
</div>

<!-- MAIN CONTENT -->
<div class="hub-content-wrap" id="hub-content">
  <div id="hub-categories"></div>
</div>

<!-- FOOTER -->
<div class="hub-footer">
  Confidential. Steve Cooper only.
</div>

  // ── CATEGORY DEFINITIONS ───────────────────────────────────
  var CATEGORIES = {
    notes:     { label: 'Meeting Notes',     icon: 'N', color: '#553c9a', bg: '#f3f0ff' },
    weekly:    { label: 'Weekly Briefings',   icon: 'W', color: '#2c5282', bg: '#ebf2fa' },
    deep:      { label: 'Deep Dives',         icon: 'D', color: '#8b6914', bg: '#faf6ed' },
    dealmaker: { label: 'DealMaker / Raise',  icon: '$', color: '#276749', bg: '#f0fff4' },
    prep:      { label: 'Prep Materials',      icon: 'P', color: '#6b46c1', bg: '#f3f0ff' },
    shared:    { label: 'Shared Documents',   icon: 'G', color: '#0d652d', bg: '#e6f4ea' },
    reference: { label: 'Reference',          icon: 'R', color: '#c53030', bg: '#fff5f5' },
    daily:     { label: 'Daily Briefings',    icon: 'd', color: '#b7791f', bg: '#fefcf3' }
  };

  var CATEGORY_ORDER = ['notes', 'prep', 'weekly', 'deep', 'dealmaker', 'shared', 'reference', 'daily'];

  var STATUS_ORDER = { 'new': 0, 'draft': 1, 'current': 2, 'superseded': 3 };

  // ── STATE ──────────────────────────────────────────────────
  var activeFilters = [];
  var activeTypeFilter = 'all';
  var viewMode = storeGet('viewMode') || 'grid';
  var showArchived = storeGet('showArchived') || false;
  var editMode = false;

  // Archive threshold: docs older than this many days can be archived
  var ARCHIVE_DAYS = 14;

  // ── UTILITIES ──────────────────────────────────────────────
  function formatDate(dateStr) {
    var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    var parts = dateStr.split('-');
    var m = parseInt(parts[1], 10) - 1;
    var d = parseInt(parts[2], 10);
    var y = parts[0];
    return months[m] + ' ' + d + ', ' + y;
  }

  function daysSince(dateStr) {
    var now = new Date('2026-03-09');
    var then = new Date(dateStr);
    return Math.floor((now - then) / (1000 * 60 * 60 * 24));
  }

  function getStatus(doc) {
    if (doc.status === 'superseded') return 'superseded';
    if (doc.status === 'draft') return 'draft';
    if (daysSince(doc.date) < 3) return 'new';
    return 'current';
  }

  function statusBadge(status) {
    var map = {
      'new': '<span class="doc-badge badge-new">NEW</span>',
      'current': '<span class="doc-badge badge-current">CURRENT</span>',
      'superseded': '<span class="doc-badge badge-superseded">SUPERSEDED</span>',
      'draft': '<span class="doc-badge badge-draft">DRAFT</span>'
    };
    return map[status] || '';
  }

  function findDoc(id) {
    for (var i = 0; i < DOCUMENTS.length; i++) {
      if (DOCUMENTS[i].id === id) return DOCUMENTS[i];
    }
    return null;
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  // ── PERSISTENCE ────────────────────────────────────────────
  function storeGet(key) {
    try {
      var raw = localStorage.getItem('tsk:index.html:' + key);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  }

  function storeSet(key, val) {
    try {
      localStorage.setItem('tsk:index.html:' + key, JSON.stringify(val));
    } catch (e) { /* degrade gracefully */ }
  }

  // ── FILTERING ──────────────────────────────────────────────
  function getFilteredDocs() {
    var query = document.getElementById('hub-search').value.toLowerCase().trim();
    return DOCUMENTS.filter(function (doc) {
      // Type filter
      if (activeTypeFilter !== 'all') {
        if (activeTypeFilter === 'notes') {
          if (doc.category !== 'notes') return false;
        } else if (activeTypeFilter === 'prep') {
          if (doc.category !== 'prep') return false;
        } else if (activeTypeFilter === 'dealmaker') {
          if (doc.category !== 'dealmaker' && doc.category !== 'deep') return false;
        } else if (activeTypeFilter === 'shared') {
          if (doc.category !== 'shared') return false;
        } else if (activeTypeFilter === 'reference') {
          if (doc.category !== 'reference') return false;
        }
      }
      // Tag filter (AND)
      for (var i = 0; i < activeFilters.length; i++) {
        var f = activeFilters[i].toLowerCase();
        var found = false;
        for (var t = 0; t < doc.tags.length; t++) {
          if (doc.tags[t].toLowerCase() === f) { found = true; break; }
        }
        for (var p = 0; p < doc.people.length; p++) {
          if (doc.people[p].toLowerCase() === f) { found = true; break; }
        }
        if (!found) return false;
      }
      // Search
      if (query) {
        var haystack = (doc.title + ' ' + doc.description + ' ' + doc.tags.join(' ') + ' ' + doc.people.join(' ')).toLowerCase();
        return haystack.indexOf(query) !== -1;
      }
      return true;
    });
  }

  function sortDocs(docs, mode) {
    var sorted = docs.slice();
    if (mode === 'date-desc') {
      sorted.sort(function (a, b) { return b.date.localeCompare(a.date); });
    } else if (mode === 'date-asc') {
      sorted.sort(function (a, b) { return a.date.localeCompare(b.date); });
    } else if (mode === 'person') {
      sorted.sort(function (a, b) {
        var pa = a.people.length ? a.people[0] : 'zzz';
        var pb = b.people.length ? b.people[0] : 'zzz';
        return pa.localeCompare(pb) || b.date.localeCompare(a.date);
      });
    } else if (mode === 'topic') {
      sorted.sort(function (a, b) {
        var ta = a.tags.length ? a.tags[0] : 'zzz';
        var tb = b.tags.length ? b.tags[0] : 'zzz';
        return ta.localeCompare(tb) || b.date.localeCompare(a.date);
      });
    } else if (mode === 'status') {
      sorted.sort(function (a, b) {
        var sa = STATUS_ORDER[getStatus(a)] || 9;
        var sb = STATUS_ORDER[getStatus(b)] || 9;
        return sa - sb || b.date.localeCompare(a.date);
      });
    }
    return sorted;
  }

  // ── RENDER CARD ────────────────────────────────────────────
  function renderCard(doc, showCatBadge) {
    var status = getStatus(doc);
    var cat = CATEGORIES[doc.category];
    var barColor = cat ? cat.color : '#999';
    var supersededClass = status === 'superseded' ? ' superseded' : '';
    var actionsClass = doc.nextSteps > 0 ? ' has-actions' : '';

    // Build tags HTML
    var tagsHtml = '';
    for (var t = 0; t < doc.tags.length; t++) {
      tagsHtml += '<button class="doc-tag" data-tag="' + escapeHtml(doc.tags[t]) + '">' + escapeHtml(doc.tags[t]) + '</button>';
    }

    // People row
    var peopleHtml = '';
    if (doc.people && doc.people.length) {
      peopleHtml = '<div class="doc-people"><span class="doc-people-icon">&#9679;</span>' + escapeHtml(doc.people.join(', ')) + '</div>';
    }

    // Category badge for flat view
    var catBadgeHtml = '';
    if (showCatBadge && cat) {
      catBadgeHtml = '<span class="doc-cat-badge" style="background:' + cat.bg + ';color:' + cat.color + '">' + escapeHtml(cat.label) + '</span>';
    }

    // Linked pair (first related doc that exists)
    var linkedHtml = '';
    if (doc.related && doc.related.length) {
      for (var r = 0; r < doc.related.length; r++) {
        var rel = findDoc(doc.related[r]);
        if (rel) {
          var linkIcon = doc.category === 'prep' ? '&#8594; ' : '&#8592; ';
          var linkLabel = doc.category === 'prep' ? 'See notes: ' : 'See prep: ';
          // Only show link if the related doc is in a complementary category
          if ((doc.category === 'prep' && rel.category === 'notes') || (doc.category === 'notes' && rel.category === 'prep')) {
            linkedHtml = '<div class="doc-linked" data-link-href="' + escapeHtml(rel.path) + '"><span class="doc-linked-icon">' + linkIcon + '</span>' + linkLabel + escapeHtml(rel.title) + '</div>';
          }
          break;
        }
      }
    }

    // Next steps bar
    var nextStepsHtml = '';
    if (doc.nextSteps > 0) {
      var label = doc.nextSteps === 1 ? '1 Action Item' : doc.nextSteps + ' Action Items';
      nextStepsHtml = '<div class="doc-next-steps"><span class="doc-next-steps-icon">&#9654;</span>' + label + '</div>';
    }

    return '<div class="doc-card' + supersededClass + actionsClass + '" data-id="' + doc.id + '" data-href="' + escapeHtml(doc.path) + '">'
      + '<div class="doc-color-bar" style="background:' + barColor + '"></div>'
      + '<div class="doc-card-body">'
      +   '<div class="doc-card-top">'
      +     statusBadge(status)
      +     catBadgeHtml
      +     '<span class="doc-date">' + formatDate(doc.date) + '</span>'
      +   '</div>'
      +   '<div class="doc-title">' + escapeHtml(doc.title) + (doc.source === 'drive' ? ' <span class="doc-drive-badge">Drive</span>' : '') + '</div>'
      +   peopleHtml
      +   '<div class="doc-desc">' + escapeHtml(doc.description) + '</div>'
      +   (tagsHtml ? '<div class="doc-tags">' + tagsHtml + '</div>' : '')
      +   linkedHtml
      +   nextStepsHtml
      + '</div>'
      + '</div>';
  }

  // ── RENDER HUB ─────────────────────────────────────────────
  function renderHub() {
    var sortMode = document.getElementById('hub-sort').value;
    var filtered = getFilteredDocs();
    var sorted = sortDocs(filtered, sortMode);
    var container = document.getElementById('hub-categories');
    var isSearching = document.getElementById('hub-search').value.trim().length > 0;
    var isCategoryView = (sortMode === 'category');

    // Load saved collapse states
    var collapseState = storeGet('categories') || {};

    var html = '';

    if (isCategoryView) {
      // Grouped by category
      for (var c = 0; c < CATEGORY_ORDER.length; c++) {
        var catKey = CATEGORY_ORDER[c];
        var cat = CATEGORIES[catKey];
        var catDocs = [];
        for (var d = 0; d < sorted.length; d++) {
          if (sorted[d].category === catKey) catDocs.push(sorted[d]);
        }

        // Sort within category by date descending
        catDocs.sort(function (a, b) { return b.date.localeCompare(a.date); });

        var isCollapsed = collapseState[catKey] === false && !isSearching;
        var collapsedClass = isCollapsed ? ' collapsed' : '';

        // Count for this category from ALL docs (not filtered), but show filtered count during search
        var totalCatDocs = 0;
        for (var td = 0; td < DOCUMENTS.length; td++) {
          if (DOCUMENTS[td].category === catKey) totalCatDocs++;
        }
        var displayCount = isSearching || activeFilters.length ? catDocs.length + ' of ' + totalCatDocs : catDocs.length;

        html += '<div class="hub-cat' + collapsedClass + '" data-cat="' + catKey + '">';
        html += '<div class="hub-cat-header" onclick="toggleCategory(\'' + catKey + '\')">';
        html += '<div class="hub-cat-icon" style="background:' + cat.bg + ';color:' + cat.color + '">' + cat.icon + '</div>';
        html += '<div class="hub-cat-title">' + escapeHtml(cat.label) + '</div>';
        html += '<div class="hub-cat-count">' + displayCount + '</div>';
        html += '<div class="hub-cat-chevron">&#9660;</div>';
        html += '</div>';
        html += '<div class="hub-cat-body">';

        if (catKey === 'daily') {
          html += '<div class="hub-cat-empty">Daily briefings are delivered via email at 6 AM EST. Check your inbox at coo@thesovereignkingdom.com</div>';
        } else if (catKey === 'weekly') {
          // Split into current and archived
          var currentWeeklies = [];
          var archivedWeeklies = [];
          for (var w = 0; w < catDocs.length; w++) {
            if (daysSince(catDocs[w].date) > ARCHIVE_DAYS) {
              archivedWeeklies.push(catDocs[w]);
            } else {
              currentWeeklies.push(catDocs[w]);
            }
          }
          if (currentWeeklies.length === 0 && archivedWeeklies.length === 0) {
            html += '<div class="hub-cat-empty">No documents yet.</div>';
          } else {
            for (var cw = 0; cw < currentWeeklies.length; cw++) {
              html += renderCard(currentWeeklies[cw], false);
            }
            if (archivedWeeklies.length > 0) {
              if (showArchived) {
                for (var aw = 0; aw < archivedWeeklies.length; aw++) {
                  html += renderCard(archivedWeeklies[aw], false);
                }
              }
              var archLabel = showArchived ? 'Hide ' + archivedWeeklies.length + ' older' : 'Show ' + archivedWeeklies.length + ' older';
              html += '<div class="hub-archive-toggle"><button class="hub-archive-btn" id="archive-toggle-btn">' + archLabel + '</button></div>';
            }
          }
        } else if (catDocs.length === 0) {
          if (isSearching || activeFilters.length) {
            html += '<div class="hub-cat-empty">No matching documents in this category.</div>';
          } else {
            html += '<div class="hub-cat-empty">No documents yet.</div>';
          }
        } else {
          for (var i = 0; i < catDocs.length; i++) {
            html += renderCard(catDocs[i], false);
          }
        }

        html += '</div></div>';
      }
    } else {
      // Flat view
      if (sorted.length === 0) {
        html += '<div class="hub-cat-empty" style="margin-top:16px">No documents match your search or filters.</div>';
      } else if (sortMode === 'person') {
        // Group by first person
        var lastPerson = '';
        for (var f = 0; f < sorted.length; f++) {
          var person = sorted[f].people.length ? sorted[f].people[0] : 'No Person';
          if (person !== lastPerson) {
            html += '<div style="grid-column:1/-1;font-size:14px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;padding:16px 0 4px;border-bottom:1px solid var(--border-light);margin-bottom:4px">' + escapeHtml(person) + '</div>';
            lastPerson = person;
          }
          html += renderCard(sorted[f], true);
        }
      } else if (sortMode === 'topic') {
        // Group by first tag (primary topic)
        var lastTopic = '';
        for (var f = 0; f < sorted.length; f++) {
          var topic = sorted[f].tags.length ? sorted[f].tags[0] : 'Uncategorized';
          if (topic !== lastTopic) {
            html += '<div style="grid-column:1/-1;font-size:14px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;padding:16px 0 4px;border-bottom:1px solid var(--border-light);margin-bottom:4px">' + escapeHtml(topic) + '</div>';
            lastTopic = topic;
          }
          html += renderCard(sorted[f], true);
        }
      } else {
        for (var f = 0; f < sorted.length; f++) {
          html += renderCard(sorted[f], true);
        }
      }
    }

    container.innerHTML = html;

    // Update stats
    updateStats(filtered.length, DOCUMENTS.length);

    // Attach card click handlers (cards are divs, not anchors)
    var cards = container.querySelectorAll('.doc-card');
    for (var ci = 0; ci < cards.length; ci++) {
      cards[ci].addEventListener('click', function () {
        var href = this.getAttribute('data-href');
        if (href) window.open(href, '_blank', 'noopener,noreferrer');
      });
    }

    // Attach tag click handlers
    var tagButtons = container.querySelectorAll('.doc-tag');
    for (var tb = 0; tb < tagButtons.length; tb++) {
      tagButtons[tb].addEventListener('click', function (e) {
        e.preventDefault();
        e.stopPropagation();
        addFilter(this.getAttribute('data-tag'));
      });
    }

    // Attach linked-doc click handlers
    var linkedLinks = container.querySelectorAll('.doc-linked');
    for (var ll = 0; ll < linkedLinks.length; ll++) {
      linkedLinks[ll].addEventListener('click', function (e) {
        e.stopPropagation();
        var href = this.getAttribute('data-link-href');
        if (href) window.open(href, '_blank', 'noopener,noreferrer');
      });
    }

    // Attach archive toggle handler
    var archBtn = document.getElementById('archive-toggle-btn');
    if (archBtn) {
      archBtn.addEventListener('click', function (e) {
        e.stopPropagation();
        showArchived = !showArchived;
        storeSet('showArchived', showArchived);
        renderHub();
      });
    }

    // Apply view mode
    var isListView = viewMode === 'list';

    if (sortMode !== 'category') {
      if (isListView) {
        container.classList.add('list-view');
        container.style.display = '';
        container.style.gridTemplateColumns = '';
        container.style.gap = '';
      } else {
        container.classList.remove('list-view');
        container.style.display = 'grid';
        container.style.gridTemplateColumns = 'repeat(auto-fill, minmax(270px, 1fr))';
        container.style.gap = '12px';
      }
    } else {
      container.classList.remove('list-view');
      container.style.display = '';
      container.style.gridTemplateColumns = '';
      container.style.gap = '';
    }

    // Apply list-view to category bodies
    var catBodies = container.querySelectorAll('.hub-cat-body');
    for (var cb = 0; cb < catBodies.length; cb++) {
      if (isListView) {
        catBodies[cb].classList.add('list-view');
      } else {
        catBodies[cb].classList.remove('list-view');
      }
    }
  }

  // ── STATS ──────────────────────────────────────────────────
  function updateStats(shown, total) {
    var el = document.getElementById('hub-stats');
    var catCount = Object.keys(CATEGORIES).length;
    if (shown < total) {
      el.textContent = shown + ' of ' + total + ' Documents | ' + catCount + ' Categories | Last Updated: Mar 9';
    } else {
      el.textContent = total + ' Documents | ' + catCount + ' Categories | Last Updated: Mar 9';
    }
  }

  // ── FILTER CHIPS ───────────────────────────────────────────
  function addFilter(tag) {
    // Check if already active
    for (var i = 0; i < activeFilters.length; i++) {
      if (activeFilters[i].toLowerCase() === tag.toLowerCase()) return;
    }
    activeFilters.push(tag);
    renderFilterChips();
    renderHub();
  }

  function removeFilter(tag) {
    activeFilters = activeFilters.filter(function (f) {
      return f.toLowerCase() !== tag.toLowerCase();
    });
    renderFilterChips();
    renderHub();
  }

  function clearFilters() {
    activeFilters = [];
    renderFilterChips();
    renderHub();
  }

  function renderFilterChips() {
    var el = document.getElementById('hub-filter-chips');
    if (activeFilters.length === 0) {
      el.className = 'hub-filter-chips';
      el.innerHTML = '';
      return;
    }
    el.className = 'hub-filter-chips active';
    var html = '';
    for (var i = 0; i < activeFilters.length; i++) {
      html += '<span class="hub-chip">' + escapeHtml(activeFilters[i])
        + ' <span class="hub-chip-x" data-filter="' + escapeHtml(activeFilters[i]) + '">&times;</span></span>';
    }
    html += '<button class="hub-clear-all" onclick="clearAllFilters()">Clear all</button>';
    el.innerHTML = html;

    // Attach remove handlers
    var xButtons = el.querySelectorAll('.hub-chip-x');
    for (var x = 0; x < xButtons.length; x++) {
      xButtons[x].addEventListener('click', function () {
        removeFilter(this.getAttribute('data-filter'));
      });
    }
  }

  // ── CATEGORY TOGGLE ────────────────────────────────────────
  window.toggleCategory = function (catKey) {
    var catEl = document.querySelector('.hub-cat[data-cat="' + catKey + '"]');
    if (!catEl) return;
    var isCollapsed = catEl.classList.contains('collapsed');
    catEl.classList.toggle('collapsed');

    // Save state
    var state = storeGet('categories') || {};
    state[catKey] = isCollapsed; // true means expanded (we store expanded state)
    storeSet('categories', state);
  };

  // ── EDIT MODE ──────────────────────────────────────────────
  window.toggleEdit = function () {
    editMode = !editMode;
    var content = document.getElementById('hub-content');
    var btnEdit = document.getElementById('btn-edit');
    var btnUndo = document.getElementById('btn-undo');

    if (editMode) {
      content.setAttribute('contenteditable', 'true');
      btnEdit.textContent = 'Done';
      btnEdit.classList.add('active');
      btnUndo.style.display = '';
      document.body.classList.add('tsk-edit-mode');
    } else {
      content.removeAttribute('contenteditable');
      btnEdit.innerHTML = '&#9998; Edit';
      btnEdit.classList.remove('active');
      btnUndo.style.display = 'none';
      document.body.classList.remove('tsk-edit-mode');
    }
  };

  // ── COPY ───────────────────────────────────────────────────
  window.copyHub = function () {
    var content = document.getElementById('hub-content');
    navigator.clipboard.writeText(content.innerText).then(function () {
      var btn = document.getElementById('btn-copy');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(function () {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 1500);
    });
  };

  // ── CLEAR ALL FILTERS (global) ─────────────────────────────
  window.clearAllFilters = function () {
    clearFilters();
  };

  // ── KEYBOARD SHORTCUTS ─────────────────────────────────────
  document.addEventListener('keydown', function (e) {
    // "/" focuses search (unless typing in an input)
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA' && !document.activeElement.isContentEditable) {
      e.preventDefault();
      document.getElementById('hub-search').focus();
    }
    // Escape clears search and filters
    if (e.key === 'Escape') {
      var search = document.getElementById('hub-search');
      if (search.value || activeFilters.length) {
        search.value = '';
        activeFilters = [];
        renderFilterChips();
        renderHub();
        search.blur();
      }
    }
  });

  // ── SEARCH ─────────────────────────────────────────────────
  document.getElementById('hub-search').addEventListener('input', function () {
    renderHub();
    // Hide shortcut hint while typing
    var hint = document.getElementById('hub-search-hint');
    hint.style.display = this.value ? 'none' : '';
  });

  document.getElementById('hub-search').addEventListener('focus', function () {
    document.getElementById('hub-search-hint').style.display = 'none';
  });

  document.getElementById('hub-search').addEventListener('blur', function () {
    if (!this.value) {
      document.getElementById('hub-search-hint').style.display = '';
    }
  });

  // ── SORT ───────────────────────────────────────────────────
  document.getElementById('hub-sort').addEventListener('change', function () {
    storeSet('sort', this.value);
    renderHub();
  });

  // ── SCROLL SHADOW ──────────────────────────────────────────
  var header = document.getElementById('hub-header');
  window.addEventListener('scroll', function () {
    if (window.scrollY > 4) {
      header.classList.add('scrolled');
    } else {
      header.classList.remove('scrolled');
    }
  });

  // ── STICKY CONTROLS POSITION ───────────────────────────────
  function positionControls() {
    var headerHeight = header.offsetHeight;
    var controls = document.getElementById('hub-controls');
    controls.style.top = headerHeight + 'px';
  }
  positionControls();
  window.addEventListener('resize', positionControls);

  // ── VIEW TOGGLE ──────────────────────────────────────────
  var viewButtons = document.querySelectorAll('.hub-view-btn');
  // Set initial active state from stored preference
  if (viewMode === 'list') {
    for (var vi = 0; vi < viewButtons.length; vi++) {
      viewButtons[vi].classList.toggle('active', viewButtons[vi].getAttribute('data-view') === 'list');
    }
  }
  for (var vi2 = 0; vi2 < viewButtons.length; vi2++) {
    viewButtons[vi2].addEventListener('click', function () {
      viewMode = this.getAttribute('data-view');
      storeSet('viewMode', viewMode);
      var allVBtns = document.querySelectorAll('.hub-view-btn');
      for (var vb = 0; vb < allVBtns.length; vb++) {
        allVBtns[vb].classList.remove('active');
      }
      this.classList.add('active');
      renderHub();
    });
  }

  // ── TYPE FILTER BAR ──────────────────────────────────────
  var typeButtons = document.querySelectorAll('.hub-type-btn');
  for (var ti = 0; ti < typeButtons.length; ti++) {
    typeButtons[ti].addEventListener('click', function () {
      activeTypeFilter = this.getAttribute('data-type');
      // Update active states
      var allBtns = document.querySelectorAll('.hub-type-btn');
      for (var ab = 0; ab < allBtns.length; ab++) {
        allBtns[ab].classList.remove('active');
      }
      this.classList.add('active');
      renderHub();
    });
  }

  // ── INIT ───────────────────────────────────────────────────
  // Restore sort preference
  var savedSort = storeGet('sort');
  if (savedSort && typeof savedSort === 'string') {
    document.getElementById('hub-sort').value = savedSort;
  }

  // Initial render
  renderHub();

})();
</script>
</body>
</html>
